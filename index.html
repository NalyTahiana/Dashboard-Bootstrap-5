<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard-admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

      <style>
    /* ── Seulement ce qu'on ne peut PAS faire avec Bootstrap ── */
    .sidebar        { width: 240px; top: 57px; height: calc(100vh - 57px); }
    .main-content   { margin-left: 240px; margin-top: 57px; }
    .sidebar-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1025; }
    .nav-link.active{ border-right: 3px solid #0d6efd; }

    @media (max-width: 767.98px) {
      .sidebar       { transform: translateX(-100%); transition: transform .3s; }
      .sidebar.open  { transform: translateX(0); }
      .main-content  { margin-left: 0; }
      .sidebar-overlay.show { display:block; }
    }
  </style>
</head>
<!-- bg-light colorie le baground en gris-->
<body class="bg-light">
    <!--
        fixed-top : fixe en haut de l'écran même si en scroll
        px : padding horizontal
        py : padding vertical
    -->
    <header class="navbar navbar-expand bg-white border-bottom fixed-top px-3 py-0 " style="height: 57px;">

        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light btn-sm d-md-none" id="sidebarToggle">
                <!--
                    bi-list : icone sur bootstrap
                    fs-5 : font-size : 5; (taille)
                -->
                <i class="bi bi-list fs-5"></i>
            </button>
            <!------------------- LOGO --------------------->
            <a href="#" class="navbar-brand fw-bold text-primary mb-0 d-flex align-items-center gap-2">
                <i class="bi bi-grid-3x3-gap-fill"> Dash-Admin</i>
            </a>
        </div>

        <!----------------------RECHERCHE----------------------->
    <div class="d-none d-sm-flex ms-3 flex-grow-1" style="max-width:220px">
      <div class="input-group input-group-sm">
        <!--
            input-group-text : sert a afficher du texte et îcone dans l'input group
            input-group-sm : small = petit
            from-control : style bootstrap pour l'input
        -->
        <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
        <input type="text" class="form-control" placeholder="Rechercher…" />
    </div>

    </div>
      <div class="ms-auto d-flex align-items-center gap-2">
        <button class="btn btn-light btn-sm position-relative">
        <i class="bi bi-bell"></i>

        <button class="btn btn-light btn-sm">
            <i class="bi bi-gear"></i>
        </button>
      </div>
    </header>

    <!-------------------- SLIDEBAR------------------->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!--
       SIDEBAR
 -->
  <nav class="sidebar bg-white border-end position-fixed overflow-auto z-3" id="sidebar">

    <div class="py-2 px-3">

      <p class="text-uppercase text-muted fw-semibold mt-3 mb-1" style="font-size:.65rem;letter-spacing:.08em">Principal</p>

      <a href="#" class="nav-link active d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-primary fw-semibold">
        <i class="bi bi-speedometer2"></i> Tableau de bord
      </a>
      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-people"></i> Élèves
      </a>
      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-book"></i> Cours
      </a>
      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-calendar3"></i> Planning
      </a>

      <p class="text-uppercase text-muted fw-semibold mt-3 mb-1" style="font-size:.65rem;letter-spacing:.08em">Gestion</p>

      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-bar-chart-line"></i> Statistiques
      </a>
      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-credit-card"></i> Paiements
      </a>
      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-chat-dots"></i> Messages
        <span class="badge bg-primary ms-auto rounded-pill">3</span>
      </a>

      <p class="text-uppercase text-muted fw-semibold mt-3 mb-1" style="font-size:.65rem;letter-spacing:.08em">Compte</p>

      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-person-circle"></i> Mon profil
      </a>
      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-secondary">
        <i class="bi bi-shield-check"></i> Sécurité
      </a>
      <a href="#" class="nav-link d-flex align-items-center gap-2 px-2 py-2 rounded-2 text-danger">
        <i class="bi bi-box-arrow-right"></i> Déconnexion
      </a>

    </div>
  </nav>
</body>
</html>
